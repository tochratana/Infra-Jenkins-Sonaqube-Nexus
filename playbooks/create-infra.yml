---
- name: Create GCP infrastructure
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/machines.yaml
  tasks:
    - name: Create GCP instances
      include_tasks: ../roles/gcp/tasks/create-gcp-instance.yaml
      loop: "{{ machines_info }}"
      loop_control:
        loop_var: machine

    - name: Read created instance JSON files
      slurp:
        src: "./gcp_instance_{{ item.name }}.json"
      register: instance_files
      loop: "{{ machines_info }}"
      when: not destroy_infrastructure | default(false)

    - name: Generate dynamic inventory from created instances
      template:
        src: ../templates/gcp-inventory-template.j2
        dest: ../inventory/gcp_dynamic.ini
      vars:
        gcp_instances: "{{ instance_files.results | map(attribute='content') | map('b64decode') | map('from_json') | list }}"
      when: not destroy_infrastructure | default(false)

    - name: Wait for instances to be SSH ready
      wait_for:
        host: "{{ instance.networkInterfaces[0].accessConfigs[0].natIP }}"
        port: 22
        delay: 5
        timeout: 300
        state: started
      vars:
        gcp_instances: "{{ instance_files.results | map(attribute='content') | map('b64decode') | map('from_json') | list }}"
      loop: "{{ gcp_instances }}"
      loop_control:
        loop_var: instance
      when: not destroy_infrastructure | default(false)

    # - name: Add created instances into in-memory inventory
    #   add_host:
    #     name: "{{ item.name }}"
    #     groups: "{{ item.name }}"
    #     ansible_host: "{{ item.networkInterfaces[0].accessConfigs[0].natIP }}"
    #     ansible_user: "{{ agent_user }}"
    #   loop: "{{ gcp_instances }}"
    #   loop_control:
    #     label: "{{ item.name }}"
    #   when: not destroy_infrastructure | default(false)

    - name: Create Jenkins DNS record in Cloudflare
      community.general.cloudflare_dns:
        zone: "{{ cloudflare_zone }}"
        record: "jenkins"
        type: A
        value: "{{ ((instance_files.results | selectattr('item.name', 'equalto', 'jenkins') | first).content | b64decode | from_json)['networkInterfaces'][0]['accessConfigs'][0]['natIP'] }}"
        proxied: "{{ cloudflare_proxied }}"
        api_token: "{{ cloudflare_api_token }}"
      when: not destroy_infrastructure | default(false)

    - name: Create SonarQube DNS record in Cloudflare
      community.general.cloudflare_dns:
        zone: "{{ cloudflare_zone }}"
        record: "sonar"
        type: A
        value: "{{ ((instance_files.results | selectattr('item.name', 'equalto', 'sonarqube') | first).content | b64decode | from_json)['networkInterfaces'][0]['accessConfigs'][0]['natIP'] }}"
        proxied: "{{ cloudflare_proxied }}"
        api_token: "{{ cloudflare_api_token }}"
      when: not destroy_infrastructure | default(false)

    - name: Create Nexus DNS record in Cloudflare
      community.general.cloudflare_dns:
        zone: "{{ cloudflare_zone }}"
        record: "nexus"
        type: A
        value: "{{ ((instance_files.results | selectattr('item.name', 'equalto', 'nexus') | first).content | b64decode | from_json)['networkInterfaces'][0]['accessConfigs'][0]['natIP'] }}"
        proxied: "{{ cloudflare_proxied }}"
        api_token: "{{ cloudflare_api_token }}"
      when: not destroy_infrastructure | default(false)

- name: Install services on created instances
  import_playbook: ../playbooks/install-services.yml
  when: not destroy_infrastructure | default(false)