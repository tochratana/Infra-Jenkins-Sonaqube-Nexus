---
- name: Install OhMyZsh dependencies
  apt:
    name:
      - zsh
      - git
      - curl
    state: present

- name: Install OhMyZsh for root
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: /root/.oh-my-zsh
  become: yes

- name: Install OhMyZsh for ansible user
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "/home/{{ ansible_user }}/.oh-my-zsh"
  become: yes
  become_user: "{{ ansible_user }}"

- name: Change default shell to zsh for ansible user
  user:
    name: "{{ ansible_user }}"
    shell: /bin/zsh

- name: Ensure Docker is installed and responding
  command: docker version
  register: docker_check
  changed_when: false
  failed_when: docker_check.rc != 0

- name: Install GitLab CLI (glab)
  block:
    - name: Download glab
      get_url:
        url: "https://gitlab.com/gitlab-org/cli/-/releases/v1.36.0/downloads/glab_1.36.0_Linux_x86_64.deb"
        dest: /tmp/glab.deb

    - name: Install glab
      apt:
        deb: /tmp/glab.deb
        state: present

- name: Install okMyZsh (zsh with oh-my-zsh)
  apt:
    name: zsh
    state: present

- name: Install oh-my-zsh
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    creates: ~/.oh-my-zsh
  become_user: "{{ ansible_user }}"


- name: Install Java (required for Jenkins)
  apt:
    name:
      - openjdk-17-jre-headless
    state: present
    update_cache: yes

- name: Ensure Jenkins home directory exists
  file:
    path: /var/jenkins_home
    state: directory
    owner: 1000
    group: 1000
    mode: '0755'

- name: Install Jenkins using Docker
  docker_container:
    name: jenkins
    image: "{{ jenkins_image | default('jenkins/jenkins:lts') }}"
    state: started
    restart_policy: always
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - /var/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    env:
      JENKINS_OPTS: "--httpListenAddress=0.0.0.0"

- name: Wait for Jenkins to be ready
  wait_for:
    host: localhost
    port: 8080
    delay: 10
    timeout: 300

- name: Install Ansible
  apt:
    name: ansible
    state: present
    update_cache: yes

- name: Install Nginx
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present

- name: Start Nginx service
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Create Nginx proxy config for Jenkins
  template:
    src: nginx-jenkins.j2
    dest: /etc/nginx/sites-available/jenkins
  notify: restart nginx

- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/jenkins
    dest: /etc/nginx/sites-enabled/jenkins
    state: link
  notify: restart nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Obtain and install TLS certificate for Jenkins (non-interactive)
  shell: >-
    certbot --nginx -d {{ jenkins_domain }} --non-interactive --agree-tos
    --redirect --email {{ certbot_email | default('admin@tochratana.com') }}
  register: certbot_result
  changed_when: certbot_result.rc == 0
  ignore_errors: true
  when: jenkins_domain is defined

- name: Install Portainer
  docker_container:
    name: portainer
    image: portainer/portainer-ce:latest
    state: started
    restart_policy: always
    ports:
      - "8000:8000"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data