---
# ─────────────────────────────────────────────
# 1. Filesystem & Container Setup
# ─────────────────────────────────────────────

- name: Install OhMyZsh dependencies
  apt:
    name:
      - zsh
      - git
      - curl
    state: present

- name: Install OhMyZsh for root
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: /root/.oh-my-zsh
  become: yes

- name: Install OhMyZsh for ansible user
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "/home/{{ ansible_user }}/.oh-my-zsh"
  become: yes
  become_user: "{{ ansible_user }}"

- name: Change default shell to zsh for ansible user
  user:
    name: "{{ ansible_user }}"
    shell: /bin/zsh

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install okMyZsh (zsh with oh-my-zsh)
  apt:
    name: zsh
    state: present

- name: Install oh-my-zsh
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    creates: ~/.oh-my-zsh
  become_user: "{{ ansible_user }}"

- name: Ensure Docker is installed and responding
  command: docker version
  register: docker_check
  changed_when: false
  failed_when: docker_check.rc != 0

- name: Create Nexus volume for persistent data
  docker_volume:
    name: nexus_data
    state: present

- name: Ensure any old nexus container is removed (avoids port conflicts)
  docker_container:
    name: nexus
    state: absent
    force_kill: yes

- name: Create Nexus container with proper configuration
  docker_container:
    name: nexus
    image: sonatype/nexus3:latest
    state: started
    restart_policy: always
    ports:
      - "8081:8081"
      - "8082:8082"  # Docker hosted repository
      - "8083:8083"  # Docker proxy repository
    volumes:
      - nexus_data:/nexus-data
    env:
      INSTALL4J_ADD_VM_PARAMS: "-Xms2g -Xmx2g -XX:MaxDirectMemorySize=3g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ─────────────────────────────────────────────
# 2. Wait for Nexus to be fully ready
# ─────────────────────────────────────────────

- name: Wait for Nexus API to be reachable
  uri:
    url: "http://localhost:8081/service/rest/v1/status"
    method: GET
    status_code: 200
  register: nexus_status
  until: nexus_status.status == 200
  retries: 40
  delay: 15
  ignore_errors: true

- name: Wait for Nexus API with fallback retry
  uri:
    url: "http://localhost:8081/service/rest/v1/status"
    method: GET
    status_code: 200, 401
  register: nexus_status_final
  until: nexus_status_final.status in [200, 401]
  retries: 20
  delay: 10

# ─────────────────────────────────────────────
# 3. Resolve admin password
# ─────────────────────────────────────────────

- name: Check if initial admin password file exists in container
  command: docker exec nexus test -f /nexus-data/admin.password
  register: admin_password_file_check
  changed_when: false
  failed_when: false

- name: Read initial admin password from container
  command: docker exec nexus cat /nexus-data/admin.password
  register: nexus_initial_password
  changed_when: false
  when: admin_password_file_check.rc == 0

- name: Set active admin password fact
  set_fact:
    nexus_admin_password: >-
      {{ nexus_initial_password.stdout | trim
         if admin_password_file_check.rc == 0
         else 'admin123' }}

- name: Display admin password note
  debug:
    msg: "Nexus admin password: {{ nexus_admin_password }}"

# ─────────────────────────────────────────────
# 4. Blob Stores
# ─────────────────────────────────────────────

- name: Get existing blob stores
  uri:
    url: "http://localhost:8081/service/rest/v1/blobstores"
    method: GET
    user: admin
    password: "{{ nexus_admin_password }}"
    force_basic_auth: yes
    return_content: yes
  register: existing_blobstores
  changed_when: false

- name: Set existing blob store names fact
  set_fact:
    existing_blobstore_names: "{{ existing_blobstores.json | map(attribute='name') | list }}"

- name: Create Docker blob store
  uri:
    url: "http://localhost:8081/service/rest/v1/blobstores/file"
    method: POST
    user: admin
    password: "{{ nexus_admin_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "docker-blob"
      path: "/nexus-data/blobs/docker-blob"
    status_code: 204
  when: '"docker-blob" not in existing_blobstore_names'
  register: docker_blob_result

- name: Create Helm blob store
  uri:
    url: "http://localhost:8081/service/rest/v1/blobstores/file"
    method: POST
    user: admin
    password: "{{ nexus_admin_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "helm-blob"
      path: "/nexus-data/blobs/helm-blob"
    status_code: 204
  when: '"helm-blob" not in existing_blobstore_names'
  register: helm_blob_result

# ─────────────────────────────────────────────
# 5. Repositories
# ─────────────────────────────────────────────

- name: Get existing repositories
  uri:
    url: "http://localhost:8081/service/rest/v1/repositories"
    method: GET
    user: admin
    password: "{{ nexus_admin_password }}"
    force_basic_auth: yes
    return_content: yes
  register: existing_repos
  changed_when: false

- name: Set existing repository names fact
  set_fact:
    existing_repo_names: "{{ existing_repos.json | map(attribute='name') | list }}"

- name: Create Docker hosted repository
  uri:
    url: "http://localhost:8081/service/rest/v1/repositories/docker/hosted"
    method: POST
    user: admin
    password: "{{ nexus_admin_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "docker-hosted"
      online: true
      storage:
        blobStoreName: "docker-blob"
        strictContentTypeValidation: true
        writePolicy: "allow"
      docker:
        v1Enabled: false
        forceBasicAuth: true
        httpPort: 8082
    status_code: 201
  when: '"docker-hosted" not in existing_repo_names'
  register: docker_hosted_result

- name: Create Docker proxy repository
  uri:
    url: "http://localhost:8081/service/rest/v1/repositories/docker/proxy"
    method: POST
    user: admin
    password: "{{ nexus_admin_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "docker-proxy"
      online: true
      storage:
        blobStoreName: "docker-blob"
        strictContentTypeValidation: true
      docker:
        v1Enabled: false
        forceBasicAuth: true
        httpPort: 8083
      proxy:
        remoteUrl: "https://registry-1.docker.io"
        contentMaxAge: 1440
        metadataMaxAge: 1440
    status_code: 201
  when: '"docker-proxy" not in existing_repo_names'
  register: docker_proxy_result

- name: Create Helm hosted repository
  uri:
    url: "http://localhost:8081/service/rest/v1/repositories/helm/hosted"
    method: POST
    user: admin
    password: "{{ nexus_admin_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "helm-hosted"
      online: true
      storage:
        blobStoreName: "helm-blob"
        strictContentTypeValidation: true
        writePolicy: "allow"
    status_code: 201
  when: '"helm-hosted" not in existing_repo_names'
  register: helm_hosted_result

# ─────────────────────────────────────────────
# 6. Nginx Reverse Proxy
# ─────────────────────────────────────────────

- name: Install Nginx
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Deploy Nginx reverse proxy config for Nexus
  template:
    src: nginx-nexus.j2
    dest: /etc/nginx/sites-available/nexus
  notify: restart nginx

- name: Enable Nexus Nginx site
  file:
    src: /etc/nginx/sites-available/nexus
    dest: /etc/nginx/sites-enabled/nexus
    state: link
  notify: restart nginx

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

# ─────────────────────────────────────────────
# 7. TLS Certificate
# ─────────────────────────────────────────────

- name: Obtain and install TLS certificate for Nexus (non-interactive)
  shell: >-
    certbot --nginx -d {{ nexus_domain }} --non-interactive --agree-tos
    --redirect --email {{ certbot_email | default('admin@tochratana.com') }}
  register: certbot_result
  changed_when: certbot_result.rc == 0
  ignore_errors: true
  when: nexus_domain is defined

# ─────────────────────────────────────────────
# 8. Summary
# ─────────────────────────────────────────────

- name: Display Nexus setup summary
  debug:
    msg: |
      ✅ Nexus Repository Manager is ready!

      📍 Access URLs:
         UI:           http://{{ nexus_domain | default('nexus.local') }}:8081
         Docker Hub:   http://{{ nexus_domain | default('nexus.local') }}:8082
         Proxy:        http://{{ nexus_domain | default('nexus.local') }}:8083

      🔐 Credentials:
         Username:     admin
         Password:     {{ nexus_admin_password }}

      📦 Repositories created:
         - docker-blob (blob store)
         - helm-blob (blob store)
         - docker-hosted (registry for pushing images)
         - docker-proxy (caches images from Docker Hub)
         - helm-hosted (for Helm charts)

      ⚠️  First Login Instructions:
         1. Login with admin / {{ nexus_admin_password }}
         2. You'll be prompted to change the password (required)
         3. Configure realm settings if needed
