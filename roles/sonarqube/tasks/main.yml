- name: Install OhMyZsh dependencies
  apt:
    name:
      - zsh
      - git
      - curl
    state: present

- name: Install OhMyZsh for root
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: /root/.oh-my-zsh
  become: yes

- name: Install OhMyZsh for ansible user
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  args:
    creates: "/home/{{ ansible_user }}/.oh-my-zsh"
  become: yes
  become_user: "{{ ansible_user }}"

- name: Change default shell to zsh for ansible user
  user:
    name: "{{ ansible_user }}"
    shell: /bin/zsh

- name: Install Nginx
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Set vm.max_map_count
  sysctl:
    name: vm.max_map_count
    value: 262144
    state: present
    reload: yes

#################################################
# Create SonarQube directory
#################################################

- name: Create SonarQube directory
  file:
    path: /opt/sonarqube
    state: directory
    mode: '0755'

- name: Deploy docker-compose file
  copy:
    src: docker-compose.yml
    dest: /opt/sonarqube/docker-compose.yml

- name: Start SonarQube
  command: docker compose up -d
  args:
    chdir: /opt/sonarqube

#################################################
# Install Portainer (Different Port)
#################################################

- name: Run Portainer
  community.docker.docker_container:
    name: portainer
    image: portainer/portainer-ce:latest
    restart_policy: always
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

#################################################
# Nginx Reverse Proxy
#################################################

- name: Ensure nginx sites-available directory exists
  file:
    path: /etc/nginx/sites-available
    state: directory
    mode: '0755'

- name: Deploy Nginx config
  template:
    src: nginx-sonarqube.j2
    dest: /etc/nginx/sites-available/sonarqube
  notify: restart nginx

- name: Enable SonarQube site
  file:
    src: /etc/nginx/sites-available/sonarqube
    dest: /etc/nginx/sites-enabled/sonarqube
    state: link
  notify: restart nginx

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Ensure Nginx running
  systemd:
    name: nginx
    state: started
    enabled: yes

# make sure sites-available directory exists (nginx package normally creates it)
- name: Ensure nginx sites-available directory exists
  file:
    path: /etc/nginx/sites-available
    state: directory
    mode: '0755'

#################################################
# HTTPS with Certbot
#################################################

- name: Obtain SSL certificate
  shell: >
    certbot --nginx -d {{ sonar_domain }}
    --non-interactive --agree-tos
    --email {{ certbot_email }}
    --redirect
  when: sonar_domain is defined


- name: Install okMyZsh (zsh with oh-my-zsh)
  apt:
    name: zsh
    state: present

- name: Install oh-my-zsh
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    creates: ~/.oh-my-zsh
  become_user: "{{ ansible_user }}"